<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Comparing free Postman alternatives</title>
  <desc id="desc">A visual comparison of seven anonymous API client options laid out as cards, with one highlighted as a recommended pick. Illustrates evaluating Postman alternatives.</desc>

  <defs>
    <style>
      .label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; fill: #6b6b6b; letter-spacing: 1.2px; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #6b6b6b; }
      .card-num { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 22px; fill: #b0b0b0; }
      .card-num-active { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 22px; fill: #3b82f6; }
      .badge { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 11px; letter-spacing: 0.8px; }
      .check { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 14px; fill: #15803d; }
      .x { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 14px; fill: #b0b0b0; }
    </style>
  </defs>

  <rect width="1200" height="420" fill="#fafaf7"/>

  <text x="600" y="60" class="label" font-size="13" text-anchor="middle">EVALUATING THE OPTIONS</text>

  <g transform="translate(60, 110)">
    <rect x="0" y="0" width="150" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
    <text x="20" y="40" class="card-num">01</text>
    <line x1="20" y1="64" x2="90" y2="64" stroke="#d4d4d4" stroke-width="2"/>
    <text x="20" y="100" class="check">✓</text>
    <line x1="40" y1="96" x2="110" y2="96" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="128" class="x">✕</text>
    <line x1="40" y1="124" x2="120" y2="124" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="156" class="check">✓</text>
    <line x1="40" y1="152" x2="100" y2="152" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="184" class="x">✕</text>
    <line x1="40" y1="180" x2="115" y2="180" stroke="#e8e8e0" stroke-width="2"/>
  </g>

  <g transform="translate(225, 110)">
    <rect x="0" y="0" width="150" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
    <text x="20" y="40" class="card-num">02</text>
    <line x1="20" y1="64" x2="100" y2="64" stroke="#d4d4d4" stroke-width="2"/>
    <text x="20" y="100" class="check">✓</text>
    <line x1="40" y1="96" x2="115" y2="96" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="128" class="check">✓</text>
    <line x1="40" y1="124" x2="100" y2="124" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="156" class="x">✕</text>
    <line x1="40" y1="152" x2="120" y2="152" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="184" class="check">✓</text>
    <line x1="40" y1="180" x2="105" y2="180" stroke="#e8e8e0" stroke-width="2"/>
  </g>

  <g transform="translate(390, 100)">
    <rect x="0" y="0" width="170" height="240" rx="14" fill="#eaf2fb" stroke="#3b82f6" stroke-width="2.5"/>

    <rect x="106" y="14" width="50" height="22" rx="11" fill="#3b82f6"/>
    <text x="131" y="29" class="badge" fill="#ffffff" text-anchor="middle">PICK</text>

    <text x="20" y="50" class="card-num-active">03</text>
    <line x1="20" y1="76" x2="120" y2="76" stroke="#3b82f6" stroke-width="2.5"/>

    <text x="20" y="114" class="check">✓</text>
    <line x1="40" y1="110" x2="135" y2="110" stroke="#7ba7d9" stroke-width="2"/>
    <text x="20" y="142" class="check">✓</text>
    <line x1="40" y1="138" x2="120" y2="138" stroke="#7ba7d9" stroke-width="2"/>
    <text x="20" y="170" class="check">✓</text>
    <line x1="40" y1="166" x2="130" y2="166" stroke="#7ba7d9" stroke-width="2"/>
    <text x="20" y="198" class="check">✓</text>
    <line x1="40" y1="194" x2="115" y2="194" stroke="#7ba7d9" stroke-width="2"/>
  </g>

  <g transform="translate(575, 110)">
    <rect x="0" y="0" width="150" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
    <text x="20" y="40" class="card-num">04</text>
    <line x1="20" y1="64" x2="85" y2="64" stroke="#d4d4d4" stroke-width="2"/>
    <text x="20" y="100" class="check">✓</text>
    <line x1="40" y1="96" x2="100" y2="96" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="128" class="x">✕</text>
    <line x1="40" y1="124" x2="120" y2="124" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="156" class="check">✓</text>
    <line x1="40" y1="152" x2="110" y2="152" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="184" class="check">✓</text>
    <line x1="40" y1="180" x2="95" y2="180" stroke="#e8e8e0" stroke-width="2"/>
  </g>

  <g transform="translate(740, 110)">
    <rect x="0" y="0" width="150" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
    <text x="20" y="40" class="card-num">05</text>
    <line x1="20" y1="64" x2="95" y2="64" stroke="#d4d4d4" stroke-width="2"/>
    <text x="20" y="100" class="x">✕</text>
    <line x1="40" y1="96" x2="115" y2="96" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="128" class="check">✓</text>
    <line x1="40" y1="124" x2="105" y2="124" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="156" class="x">✕</text>
    <line x1="40" y1="152" x2="120" y2="152" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="184" class="check">✓</text>
    <line x1="40" y1="180" x2="100" y2="180" stroke="#e8e8e0" stroke-width="2"/>
  </g>

  <g transform="translate(905, 110)">
    <rect x="0" y="0" width="150" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>
    <text x="20" y="40" class="card-num">06</text>
    <line x1="20" y1="64" x2="80" y2="64" stroke="#d4d4d4" stroke-width="2"/>
    <text x="20" y="100" class="check">✓</text>
    <line x1="40" y1="96" x2="105" y2="96" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="128" class="check">✓</text>
    <line x1="40" y1="124" x2="115" y2="124" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="156" class="check">✓</text>
    <line x1="40" y1="152" x2="95" y2="152" stroke="#e8e8e0" stroke-width="2"/>
    <text x="20" y="184" class="x">✕</text>
    <line x1="40" y1="180" x2="120" y2="180" stroke="#e8e8e0" stroke-width="2"/>
  </g>

  <g transform="translate(1070, 110)">
    <rect x="0" y="0" width="80" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1" stroke-dasharray="4 4"/>
    <text x="40" y="120" class="card-num" text-anchor="middle">07</text>
    <text x="40" y="148" class="sub" font-size="14" text-anchor="middle">…</text>
  </g>

  <text x="600" y="392" class="sub" font-size="16" text-anchor="middle">Different priorities · different winners · same goal</text>
</svg>
