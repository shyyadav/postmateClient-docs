<svg width="1200" height="500" viewBox="0 0 1200 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Data-driven API testing workflow</title>
  <desc id="desc">A diagram showing one GET request running against a 50-row data table, producing results with 48 passed and 2 failed.</desc>

  <defs>
    <style>
      .brand { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; fill: #6b6b6b; letter-spacing: 1.5px; }
      .sub { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 400; fill: #6b6b6b; }
      .code { font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace; fill: #1a1a1a; }
      .row-text { font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace; font-size: 18px; fill: #1a1a1a; }
      .row-muted { font-family: "SF Mono", Menlo, Monaco, Consolas, "Courier New", monospace; font-size: 18px; fill: #9a9a9a; }
      .badge { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 14px; }
      .step-label { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-weight: 500; font-size: 16px; fill: #6b6b6b; letter-spacing: 0.5px; }
    </style>
  </defs>

  <rect width="1200" height="500" fill="#fafaf7"/>

  <rect x="0" y="0" width="8" height="500" fill="#3b82f6"/>

  <text x="160" y="100" class="step-label" text-anchor="middle">1 · REQUEST</text>
  <text x="540" y="100" class="step-label" text-anchor="middle">2 · DATA TABLE</text>
  <text x="940" y="100" class="step-label" text-anchor="middle">3 · RESULTS</text>

  <g transform="translate(60, 140)">
    <rect x="0" y="0" width="320" height="100" rx="12" fill="#eaf2fb" stroke="#7ba7d9" stroke-width="1"/>
    <text x="24" y="42" class="code" font-size="16" fill="#6b6b6b">GET</text>
    <text x="24" y="74" class="code" font-size="22">/users/{{userId}}</text>
  </g>

  <g transform="translate(400, 178)">
    <line x1="0" y1="12" x2="80" y2="12" stroke="#9a9a9a" stroke-width="1.5" stroke-dasharray="5 4"/>
    <path d="M 73 5 L 84 12 L 73 19" fill="none" stroke="#9a9a9a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(500, 140)">
    <rect x="0" y="0" width="280" height="220" rx="12" fill="#ffffff" stroke="#d4d4d4" stroke-width="1"/>

    <rect x="0" y="0" width="280" height="40" rx="12" fill="#f3f3ee"/>
    <rect x="0" y="28" width="280" height="12" fill="#f3f3ee"/>
    <text x="20" y="26" class="badge" fill="#6b6b6b">DATA TABLE · 50 rows</text>

    <text x="20" y="74" class="row-text">user_001</text>
    <text x="20" y="104" class="row-text">user_002</text>
    <text x="20" y="134" class="row-text">user_003</text>

    <rect x="10" y="146" width="260" height="28" rx="5" fill="#fef3c7"/>
    <text x="20" y="166" class="row-text" fill="#92400e">user_004 ← row 4</text>

    <text x="20" y="196" class="row-muted">…46 more</text>
  </g>

  <g transform="translate(800, 178)">
    <line x1="0" y1="12" x2="80" y2="12" stroke="#9a9a9a" stroke-width="1.5" stroke-dasharray="5 4"/>
    <path d="M 73 5 L 84 12 L 73 19" fill="none" stroke="#9a9a9a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(900, 140)">
    <rect x="0" y="0" width="240" height="220" rx="12" fill="#e8f4ec" stroke="#6ba585" stroke-width="1"/>

    <circle cx="32" cy="64" r="6" fill="#15803d"/>
    <text x="50" y="70" class="row-text">48 passed</text>

    <circle cx="32" cy="100" r="6" fill="#dc2626"/>
    <text x="50" y="106" class="row-text">2 failed</text>

    <line x1="20" y1="130" x2="220" y2="130" stroke="#6ba585" stroke-width="1" opacity="0.4"/>

    <text x="20" y="158" class="sub" font-size="14">Per-row pass/fail</text>
    <text x="20" y="180" class="sub" font-size="14">Response times</text>
    <text x="20" y="202" class="sub" font-size="14">HTML report export</text>
  </g>

  <text x="600" y="430" class="sub" font-size="18" text-anchor="middle">One request · 50 inputs · zero loops</text>
</svg>
